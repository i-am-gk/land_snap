name: landsnap_demo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_animations: ^0.7.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo1.png
    - assets/logo2.png
    - assets/logo3.png
    - assets/logo4.png
    - assets/logo5.png
    - assets/logo6.png
    - assets/map_data.json

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true   # <-- IMPORTANT for iOS
